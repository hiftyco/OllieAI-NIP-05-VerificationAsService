<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIP-05 Verification Checker</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --orange: #f7931a;
            --green: #2ea043;
            --red: #f85149;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
        }
        .container { background: var(--card); border-radius: 16px; padding: 32px; border: 1px solid var(--border); }
        h1 { color: var(--orange); }
        .subtitle { color: var(--text-muted); }
        .checker { margin: 24px 0; display: flex; gap: 8px; }
        .checker input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 16px; }
        .checker button { padding: 12px 24px; background: var(--orange); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .result { margin-top: 24px; padding: 20px; border-radius: 8px; display: none; }
        .result.verified { background: rgba(46, 160, 67, 0.1); border: 1px solid var(--green); }
        .result.not-verified { background: rgba(248, 81, 73, 0.1); border: 1px solid var(--red); }
        .result h3 { margin: 0 0 12px 0; }
        .result.verified h3 { color: var(--green); }
        .result.not-verified h3 { color: var(--red); }
        .info { margin-top: 12px; color: var(--text-muted); font-size: 14px; }
        .cta { background: var(--orange); color: #000; padding: 16px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 NIP-05 Verification Checker</h1>
        <p class="subtitle">Check if a username is verified on Nostr</p>
        
        <div class="checker">
            <input type="text" id="username" placeholder="Enter username (e.g., satoshi)" />
            <button onclick="checkUser()">Check</button>
        </div>
        
        <div id="result" class="result"></div>
        
        <div class="info" style="margin-top: 32px;">
            <h3>How it works</h3>
            <p>NIP-05 verification proves someone controls their Nostr pubkey. Enter a username to check if they're verified.</p>
        </div>
        
        <a href="nostr:npub1a3lz855htm20sfcd0y2hp38e4h2akrqjj92spvruw8ge9yslrgws4x8vth" class="cta">⚡ Get Verified Now</a>
    </div>
    
    <script>
        const REPO = 'hiftyco/OllieAI-NIP-05-VerificationAsService';
        
        async function checkUser() {
            const username = document.getElementById('username').value.trim();
            const result = document.getElementById('result');
            
            if (!username) { alert('Please enter a username'); return; }
            
            result.className = 'result';
            result.style.display = 'block';
            result.innerHTML = '<p class="loading">Checking...</p>';
            
            try {
                // Try nostr.json at root (GitHub Pages compatible)
                const response = await fetch(`https://raw.githubusercontent.com/${REPO}/main/nostr.json`);
                const data = await response.json();
                const names = data.names || {};
                
                const found = Object.entries(names).find(([k]) => k.toLowerCase() === username.toLowerCase());
                
                if (found) {
                    const [name, pubkey] = found;
                    result.className = 'result verified';
                    result.innerHTML = `
                        <h3>✅ VERIFIED</h3>
                        <p><strong>Username:</strong> ${name}</p>
                        <p><strong>NIP-05:</strong> ${name}@nip05.hifty.co</p>
                        <p><strong>Pubkey:</strong></p>
                        <code style="word-break: break all; font-size: 12px;">${pubkey}</code>
                        <p class="info" style="margin-top: 12px;">This NIP-05 is live! Clients like Primal, Damus, and Iris will show this user as verified.</p>
                    `;
                } else {
                    result.className = 'result not-verified';
                    result.innerHTML = `
                        <h3>❌ NOT VERIFIED</h3>
                        <p>Username "<strong>${username}</strong>" is not yet verified.</p>
                        <p class="info">To get verified, DM us on Nostr or zap this note!</p>
                    `;
                }
            } catch (error) {
                result.className = 'result not-verified';
                result.innerHTML = '<h3>❌ Error</h3><p>Could not check. Please try again.</p>';
            }
        }
    </script>
</body>
</html>
